name: Dev CI/CD Pipeline

on:
  push:
    branches:
      - dev

jobs:
  scan:
    name: Snyk & SonarQube Scanner
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        with:
          args: >-
            -Dsonar.organization=kusanali3110
            -Dsonar.projectKey=kusanali3110_NT505.Q21-KLTN
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Setup Node.js (For Frontend Dependencies)
        uses: actions/setup-node@v3
        with:
          node-version: "22"

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Snyk SCA - Frontend
        run: |
          cd app/frontend
          npm ci
          snyk test --all-projects
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Setup Python (For Backend Dependencies)
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Snyk SCA - Backend
        run: |
          for service in user device alert signaling; do
            echo "Scanning $service-service..."
            cd app/services/$service-service
            pip install -r requirements.txt
            snyk test --file=requirements.txt
            cd ../../../
          done
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  build-scan-push:
    name: Package Image - ${{ matrix.service }}
    needs: scan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: user-service
            context: app
            dockerfile: app/services/user-service/Dockerfile
          - service: device-service
            context: app
            dockerfile: app/services/device-service/Dockerfile
          - service: alert-service
            context: app
            dockerfile: app/services/alert-service/Dockerfile
          - service: signaling-service
            context: app
            dockerfile: app/services/signaling-service/Dockerfile
          - service: frontend
            context: app/frontend
            dockerfile: app/frontend/Dockerfile

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve Docker Tags
        id: compute-tags
        run: |
          REPO="${{ secrets.DOCKERHUB_USERNAME }}/NT505-Q21-KLTN-${{ matrix.service }}"
          SHA_TAG="$REPO:${{ github.sha }}"
          DEV_TAG="$REPO:dev"
          echo "sha-tag=$SHA_TAG" >> $GITHUB_ENV
          echo "dev-tag=$DEV_TAG" >> $GITHUB_ENV

      - name: Build Local Image
        uses: docker/build-push-action@v4
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: ${{ env.sha-tag }}
          build-args: |
            VITE_API_GATEWAY_URL=${{ vars.VITE_API_GATEWAY_URL }}

      - name: Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.sha-tag }}
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

      - name: Deploy Images to Registry
        if: success()
        run: |
          docker tag ${{ env.sha-tag }} ${{ env.dev-tag }}
          docker push ${{ env.sha-tag }}
          docker push ${{ env.dev-tag }}
