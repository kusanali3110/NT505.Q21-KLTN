apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-mqtt-config
  labels:
    app: mqtt-broker
data:
  mosquitto.conf: |
    persistence false
    log_dest stdout
    
    allow_anonymous false
    password_file /mosquitto/passwords/passwd
    
    listener 1883 0.0.0.0
    protocol mqtt
    
    listener 9002 0.0.0.0
    protocol websockets
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mqtt-data
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-mqtt-broker
  labels:
    app: mqtt-broker
spec:
  replicas: {{ .Values.mqttBroker.replicaCount }}
  selector:
    matchLabels:
      app: mqtt-broker
  template:
    metadata:
      labels:
        app: mqtt-broker
    spec:
      containers:
        - name: mosquitto
          image: eclipse-mosquitto:2
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              mkdir -p /mosquitto/passwords
              mosquitto_passwd -b -c /mosquitto/passwords/passwd "$MQTT_USERNAME" "$MQTT_PASSWORD"
              chown mosquitto:mosquitto /mosquitto/passwords/passwd
              chmod 640 /mosquitto/passwords/passwd
              exec mosquitto -c /mosquitto/config/mosquitto.conf
          env:
            - name: MQTT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: visionguard-app-secrets
                  key: MQTT_USERNAME
            - name: MQTT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: visionguard-app-secrets
                  key: MQTT_PASSWORD
          ports:
            - containerPort: 1883
              name: mqtt
            - containerPort: 9002
              name: ws
          volumeMounts:
            - name: mosquitto-config
              mountPath: /mosquitto/config/mosquitto.conf
              subPath: mosquitto.conf
            - name: mosquitto-passwords
              mountPath: /mosquitto/passwords
            - name: mosquitto-data
              mountPath: /mosquitto/data
      volumes:
        - name: mosquitto-config
          configMap:
            name: {{ .Release.Name }}-mqtt-config
        - name: mosquitto-passwords
          emptyDir: {}
        - name: mosquitto-data
          persistentVolumeClaim:
            claimName: mqtt-data
---
apiVersion: v1
kind: Service
metadata:
  name: mqtt-broker
  labels:
    app: mqtt-broker
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.mqttBroker.port }}
      targetPort: mqtt
      name: mqtt
    - port: {{ .Values.mqttBroker.wsPort }}
      targetPort: ws
      name: ws
  selector:
    app: mqtt-broker
