apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-user-service
  labels:
    app: user-service
spec:
  replicas: {{ .Values.userService.replicaCount }}
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: "{{ .Values.image.repository }}/app-user-service:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: visionguard-app-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: visionguard-app-secrets
                  key: JWT_SECRET
            - name: JWT_ALGORITHM
              value: "HS256"
            - name: ACCESS_TOKEN_MINUTES
              value: "1440"
            - name: SMTP_HOST
              value: "smtp.gmail.com" # Can be externalized if needed
            - name: SMTP_PORT
              value: "587"
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: visionguard-app-secrets
                  key: SMTP_USER
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: visionguard-app-secrets
                  key: SMTP_PASSWORD
            - name: ADMIN_DEFAULT_EMAIL
              valueFrom:
                secretKeyRef:
                  name: visionguard-app-secrets
                  key: ADMIN_DEFAULT_EMAIL
            - name: ADMIN_DEFAULT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: visionguard-app-secrets
                  key: ADMIN_DEFAULT_PASSWORD
            - name: FRONTEND_URL
              value: "https://{{ .Values.domain }}"
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  labels:
    app: user-service
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.userService.port }}
      targetPort: http
      name: http
  selector:
    app: user-service
