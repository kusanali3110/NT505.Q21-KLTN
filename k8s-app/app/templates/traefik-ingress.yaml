apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-api-prefix
  namespace: {{ .Release.Namespace | default "default" }}
spec:
  stripPrefixRegex:
    regex:
      - "^/api/users/?"
      - "^/api/devices/?"
      - "^/api/alerts/?"
      - "^/mqtt/?"
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress
  namespace: {{ .Release.Namespace | default "default" }}
  annotations:
    kubernetes.io/ingress.class: traefik
    cert-manager.io/cluster-issuer: letsencrypt-cloudflare
    traefik.ingress.kubernetes.io/router.middlewares: {{ .Release.Name }}-strip-api-prefix@kubernetescrd
spec:
  tls:
    - hosts:
        - {{ .Values.domain }}
      secretName: {{ .Release.Name }}-tls-cert-secret
  rules:
    - host: {{ .Values.domain }}
      http:
        paths:
          # 1. User Service
          - path: /api/users
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: {{ .Values.userService.port }}
          
          # 2. Device Service
          - path: /api/devices
            pathType: Prefix
            backend:
              service:
                name: device-service
                port:
                  number: {{ .Values.deviceService.port }}
          
          # 3. Alert Service
          - path: /api/alerts
            pathType: Prefix
            backend:
              service:
                name: alert-service
                port:
                  number: {{ .Values.alertService.port }}
          
          # 4. Signaling Service (Giữ nguyên /ws)
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: signaling-service
                port:
                  number: {{ .Values.signalingService.port }}
          
          # 5. MQTT over WebSockets
          - path: /mqtt
            pathType: Prefix
            backend:
              service:
                name: mqtt-broker
                port:
                  number: {{ .Values.mqttBroker.wsPort }}

          # 6. Frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: {{ .Values.frontend.port }}
