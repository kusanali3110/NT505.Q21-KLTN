apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-signaling-service
  labels:
    app: signaling-service
spec:
  replicas: {{ .Values.signalingService.replicaCount }}
  selector:
    matchLabels:
      app: signaling-service
  template:
    metadata:
      labels:
        app: signaling-service
    spec:
      containers:
        - name: signaling-service
          image: "{{ .Values.image.repository }}/app-signaling-service:{{ .Values.signalingService.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: visionguard-app-secrets
                  key: DATABASE_URL
            - name: MQTT_HOST
              value: "mqtt-broker"
            - name: MQTT_PORT
              value: "1883"
            - name: MQTT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: visionguard-app-secrets
                  key: MQTT_USERNAME
            - name: MQTT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: visionguard-app-secrets
                  key: MQTT_PASSWORD
            - name: MQTT_TOPIC_PREFIX
              value: "visionguard"
            - name: MQTT_CLIENT_ID
              value: "signaling-service"
            - name: DEVICE_SERVICE_URL
              value: "http://device-service:8000"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: visionguard-app-secrets
                  key: JWT_SECRET
            - name: JWT_ALGORITHM
              value: "HS256"
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
---
apiVersion: v1
kind: Service
metadata:
  name: signaling-service
  labels:
    app: signaling-service
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.signalingService.port }}
      targetPort: http
      name: http
  selector:
    app: signaling-service
