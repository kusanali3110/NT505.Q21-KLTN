apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-device-service
  labels:
    app: device-service
spec:
  replicas: {{ .Values.deviceService.replicaCount }}
  selector:
    matchLabels:
      app: device-service
  template:
    metadata:
      labels:
        app: device-service
    spec:
      containers:
        - name: device-service
          image: "{{ .Values.image.repository }}/app-device-service:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: visionguard-app-secrets
                  key: DATABASE_URL
            - name: MQTT_HOST
              value: "mqtt-broker"
            - name: MQTT_PORT
              value: "1883"
            - name: MQTT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: visionguard-app-secrets
                  key: MQTT_USERNAME
            - name: MQTT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: visionguard-app-secrets
                  key: MQTT_PASSWORD
            - name: MQTT_TOPIC_PREFIX
              value: "visionguard"
            - name: MQTT_CLIENT_ID
              value: "device-service"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: visionguard-app-secrets
                  key: JWT_SECRET
            - name: JWT_ALGORITHM
              value: "HS256"
---
apiVersion: v1
kind: Service
metadata:
  name: device-service
  labels:
    app: device-service
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.deviceService.port }}
      targetPort: http
      name: http
  selector:
    app: device-service
