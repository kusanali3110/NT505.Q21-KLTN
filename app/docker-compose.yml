services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mqtt-broker:
    image: eclipse-mosquitto:2
    # mosquitto runs as user mosquitto; passwd must be readable by that user (chown after creation).
    # Store passwd on a named volume.
    environment:
      MQTT_USERNAME: ${MQTT_USERNAME}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
    command:
      - sh
      - -c
      - |
        mkdir -p /mosquitto/passwords
        mosquitto_passwd -b -c /mosquitto/passwords/passwd "$MQTT_USERNAME" "$MQTT_PASSWORD"
        chown mosquitto:mosquitto /mosquitto/passwords/passwd
        chmod 640 /mosquitto/passwords/passwd
        exec mosquitto -c /mosquitto/config/mosquitto.conf
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mqtt_passwd:/mosquitto/passwords
    ports:
      - "${MQTT_PORT:-1883}:1883"
      - "${MQTT_WS_PORT:-9002}:9002"
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x mosquitto >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 8
      start_period: 15s

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_MINUTES: ${ACCESS_TOKEN_MINUTES:-1440}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      ADMIN_DEFAULT_EMAIL: ${ADMIN_DEFAULT_EMAIL:-}
      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import socket; s=socket.create_connection(('127.0.0.1',8000),2); s.close()"
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 25s
    ports:
      - "${USER_SERVICE_PORT:-8001}:8000"

  device-service:
    build:
      context: .
      dockerfile: services/device-service/Dockerfile
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
      MQTT_HOST: ${MQTT_HOST:-mqtt-broker}
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_USERNAME: ${MQTT_USERNAME}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      MQTT_TOPIC_PREFIX: ${MQTT_TOPIC_PREFIX:-visionguard}
      MQTT_CLIENT_ID: device-service
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}

    depends_on:
      postgres:
        condition: service_healthy
      mqtt-broker:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import socket; s=socket.create_connection(('127.0.0.1',8000),2); s.close()"
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 25s
    ports:
      - "${DEVICE_SERVICE_PORT:-8002}:8000"

  alert-service:
    build:
      context: .
      dockerfile: services/alert-service/Dockerfile
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
      MQTT_HOST: ${MQTT_HOST:-mqtt-broker}
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_USERNAME: ${MQTT_USERNAME}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      MQTT_TOPIC_PREFIX: ${MQTT_TOPIC_PREFIX:-visionguard}
      MQTT_CLIENT_ID: alert-service
      DEVICE_SERVICE_URL: http://device-service:8000
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
    depends_on:
      postgres:
        condition: service_healthy
      mqtt-broker:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import socket; s=socket.create_connection(('127.0.0.1',8000),2); s.close()"
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 25s
    ports:
      - "${ALERT_SERVICE_PORT:-8003}:8000"

  signaling-service:
    build:
      context: .
      dockerfile: services/signaling-service/Dockerfile
    environment:
      MQTT_HOST: ${MQTT_HOST:-mqtt-broker}
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_USERNAME: ${MQTT_USERNAME}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      MQTT_TOPIC_PREFIX: ${MQTT_TOPIC_PREFIX:-visionguard}
      MQTT_CLIENT_ID: signaling-service
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      DEVICE_SERVICE_URL: http://device-service:8000
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
    depends_on:
      mqtt-broker:
        condition: service_healthy
      redis:
        condition: service_healthy
      device-service:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import socket; s=socket.create_connection(('127.0.0.1',8000),2); s.close()"
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 25s
    ports:
      - "${SIGNALING_SERVICE_PORT:-8004}:8000"

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    ports:
      - "${API_GATEWAY_PORT:-8080}:8080"
    depends_on:
      mqtt-broker:
        condition: service_healthy
      user-service:
        condition: service_healthy
      device-service:
        condition: service_healthy
      alert-service:
        condition: service_healthy
      signaling-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_GATEWAY_URL: ${VITE_API_GATEWAY_URL:-http://localhost:8080}
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  pg_data:
  mqtt_passwd:
