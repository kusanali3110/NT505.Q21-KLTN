worker_processes auto;
events { worker_connections 1024; }

http {
    # Increase buffer sizes for WebSocket/WebRTC
    proxy_buffer_size          128k;
    proxy_buffers              4 256k;
    proxy_busy_buffers_size    256k;

    # Upstreams removed in favor of direct proxy_pass to DNS hostnames

    server {
        listen 8080;
        server_name _;

        # Health check for the gateway itself
        location = /health {
            access_log off;
            default_type application/json;
            return 200 '{"status":"ok","service":"api-gateway"}';
        }

        # User service
        location /api/users/ {
            rewrite            ^/api/users/(.*)$ /$1 break;
            proxy_pass         http://user-service:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Device service
        location /api/devices/ {
            proxy_pass         http://device-service:8000/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Alert service
        location /api/alerts/ {
            proxy_pass         http://alert-service:8000/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Signaling service — WebSocket upgrade support
        location /ws/ {
            proxy_pass         http://signaling-service:8000/ws/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade                  $http_upgrade;
            proxy_set_header   Connection               "upgrade";
            proxy_set_header   Host                     $host;
            proxy_set_header   X-Real-IP                $remote_addr;
            proxy_set_header   X-Forwarded-For          $proxy_add_x_forwarded_for;
            proxy_set_header   Sec-WebSocket-Protocol   $http_sec_websocket_protocol;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # MQTT over WebSocket: edge devices use this path -> Mosquitto WS listener (GET / on broker)
        location /mqtt {
            proxy_pass         http://mqtt-broker:9002/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade                  $http_upgrade;
            proxy_set_header   Connection               "upgrade";
            proxy_set_header   Host                     $host;
            proxy_set_header   X-Real-IP                $remote_addr;
            proxy_set_header   X-Forwarded-For          $proxy_add_x_forwarded_for;
            proxy_set_header   Sec-WebSocket-Protocol   $http_sec_websocket_protocol;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

    }
}
